server:
  port: 5000

spring:
  application:
    name: GATEWAY-SERVER


cloud:
   gateway:
     mvc:
       routes:
         - id: USER-SERVICE
           uri:
             lb://USER-SERVICE
           predicates:
             -Path=/auth/**, /users/**, /api/users/**, /
         - id: TASK-SERVICE
           uri:
             lb://TASK-SERVICE
           predicates:
             - Path=/api/task/**, /tasks/**,

         - id: TASK-SUBMISSION-SERVICE
           uri:
             lb://TASK-SUBMISSION-SERVICE
           predicates:
             - Path=/api/submissions/**, /submissions/**
       default-filters:
         - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin

       globalcors:
         cors-configuration:
           '[/**]':
             allowedOrigins: "*"
             allowedMethods: "*"
             allowedHeaders: "*"


eureka:
  instance:
    prefer-ip-address: true
  client:
    fetch-registry: true
    register-with-eureka: true
    serviceUrl:
      defaultZone: http://localhost:8070/eureka/
